{% extends 'base.html' %}{% block content %}<h3 class="fw-bold mb-3">Store</h3><form class="card" method="post"><div class="card-body row g-3"><div class="col-md-3"><label>Code</label><input class="form-control" name="code" value="{{store.code or ''}}" required></div><div class="col-md-6"><label>Name</label><input class="form-control" name="name" value="{{store.name or ''}}" required></div><div class="col-md-3"><label>City</label><input class="form-control" name="city" value="{{store.city or ''}}"></div><div class="col-md-3 form-check ms-2"><input class="form-check-input" name="active" type="checkbox" {{'checked' if store.active}}><label class="form-check-label">Active</label></div></div><div class="card-footer text-end"><button class="btn btn-orange">Save</button></div></form>{% endblock %}
