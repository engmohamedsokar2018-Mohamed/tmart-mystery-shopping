{% extends 'base.html' %}{% block content %}<h3 class="fw-bold mb-3">User</h3><form class="card" method="post"><div class="card-body row g-3"><div class="col-md-3"><label>Username</label><input class="form-control" name="username" value="{{user.username or ''}}" required></div><div class="col-md-4"><label>Full Name</label><input class="form-control" name="full_name" value="{{user.full_name or ''}}" required></div><div class="col-md-2"><label>Role</label><select class="form-select" name="role"><option {{'selected' if user.role=='admin'}}>admin</option><option {{'selected' if user.role=='manager'}}>manager</option><option {{'selected' if user.role=='auditor'}}>auditor</option></select></div><div class="col-md-3"><label>Focus</label><input class="form-control" name="focus" value="{{user.focus or ''}}"></div><div class="col-md-4"><label>Password {% if user.id %}(leave empty to keep){% endif %}</label><input class="form-control" type="password" name="password" {% if not user.id %}required{% endif %}></div><div class="col-md-3 form-check mt-5"><input class="form-check-input" type="checkbox" name="is_active" {{'checked' if user.is_active_flag or not user.id}}><label class="form-check-label">Active</label></div></div><div class="card-footer text-end"><button class="btn btn-orange">Save</button></div></form>{% endblock %}
