{% extends 'base.html' %}{% block content %}<h3 class="fw-bold mb-3">New Issue</h3><form class="card" method="post" enctype="multipart/form-data"><div class="card-body row g-3"><div class="col-md-3"><label>Date</label><input class="form-control" name="date" type="date" value="{{today}}"></div><div class="col-md-5"><label>Store</label><select class="form-select" name="store_id">{% for s in stores %}<option value="{{s.id}}">{{s.code}} - {{s.name}}</option>{% endfor %}</select></div><div class="col-md-4"><label>Assigned To</label><select class="form-select" name="assigned_to_id"><option value="">-</option>{% for u in users %}<option value="{{u.id}}">{{u.full_name}}</option>{% endfor %}</select></div><div class="col-md-4"><label>Category</label><input class="form-control" name="category"></div><div class="col-md-2"><label>Severity</label><select class="form-select" name="severity"><option>low</option><option selected>medium</option><option>high</option><option>critical</option></select></div><div class="col-md-2"><label>Status</label><select class="form-select" name="status"><option>open</option><option>in-progress</option><option>closed</option></select></div><div class="col-md-2"><label>Due Date</label><input class="form-control" type="date" name="due_date"></div><div class="col-md-2"><label>Photo</label><input class="form-control" name="photo" type="file"></div><div class="col-12"><label>Description</label><textarea class="form-control" name="description" required rows="4"></textarea></div><div class="col-12"><label>Corrective Action</label><textarea class="form-control" name="corrective_action" rows="3"></textarea></div></div><div class="card-footer text-end"><button class="btn btn-orange">Save Issue</button></div></form>{% endblock %}
