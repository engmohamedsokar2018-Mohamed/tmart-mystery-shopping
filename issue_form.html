{% extends 'base.html' %}{% block title %}New Issue{% endblock %}{% block content %}<form class="card" method="post"><h3>Issue Details</h3><div class="body"><div class="form-grid"><div class="field"><label>Store</label><select name="store_code">{% for s in stores %}<option value="{{s.code}}">{{s.code}} - {{s.name}}</option>{% endfor %}</select></div><div class="field"><label>Category</label><select name="category">{% for c in categories %}<option>{{c}}</option>{% endfor %}</select></div><div class="field"><label>Date</label><input type="date" name="issue_date" value="{{today}}"></div><div class="field"><label>Status</label><select name="status"><option value="open">Open</option><option value="in-progress">In Progress</option><option value="closed">Closed</option></select></div><div class="field"><label>Severity</label><select name="severity"><option>low</option><option selected>medium</option><option>high</option><option>critical</option></select></div><div class="field"><label>Assigned To</label><select name="assigned_to"><option></option>{% for u in users %}<option>{{u.name}}</option>{% endfor %}</select></div></div><div class="field" style="margin-top:14px"><label>Description</label><textarea name="description" required></textarea></div><div class="field" style="margin-top:14px"><label>Action Taken</label><textarea name="action_taken"></textarea></div><button class="btn btn-orange" style="margin-top:14px">Save Issue</button></div></form>{% endblock %}
