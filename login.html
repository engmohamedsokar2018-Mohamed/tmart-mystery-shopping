<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}"></head><body class="login-bg"><div class="login-card"><h3 class="fw-bold mb-1">Mystery Shopping</h3><p class="text-muted mb-4">Talabat Mart Quality System</p>{% with messages=get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="alert alert-{{c}}">{{m}}</div>{% endfor %}{% endwith %}<form method="post"><label class="form-label">Username</label><input class="form-control mb-3" name="username" required><label class="form-label">Password</label><input class="form-control mb-3" name="password" type="password" required><button class="btn btn-orange w-100">Sign in</button></form><div class="small text-muted mt-3">Default: admin / Admin@2024</div></div></body></html>
