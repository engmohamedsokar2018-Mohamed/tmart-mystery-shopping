<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title><style>body{margin:0;font-family:Arial,sans-serif;background:#1a1a2e;min-height:100vh;display:grid;place-items:center}.box{width:360px;max-width:92%;background:#fff;border-radius:16px;padding:28px;box-shadow:0 20px 50px #0005}.logo{width:64px;height:64px;background:#ff6b00;border-radius:18px;margin:auto}.h{text-align:center}input{width:100%;padding:13px;margin:7px 0 14px;border:1px solid #ddd;border-radius:8px;font-size:16px;box-sizing:border-box}button{width:100%;padding:14px;background:#ff6b00;color:#fff;border:0;border-radius:8px;font-weight:800;font-size:16px}.err{background:#fee2e2;color:#991b1b;padding:10px;border-radius:8px;margin-bottom:10px}.hint{font-size:12px;color:#777;text-align:center;margin-top:12px}</style></head><body><form class="box" method="post"><div class="logo"></div><h2 class="h">Mystery Shopping System</h2><p class="h">Talabat Mart Quality Department</p>{% with messages=get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="err">{{m}}</div>{% endfor %}{% endwith %}<label>Username</label><input name="username" autocomplete="username" required><label>Password</label><input name="password" type="password" autocomplete="current-password" required><button>Sign In</button><div class="hint">Admin: admin / Admin@2024</div></form></body></html>
