{% extends 'base.html' %}{% block content %}<div class="d-flex justify-content-between mb-3"><h3 class="fw-bold">Users Management</h3><a class="btn btn-orange" href="{{ url_for('user_form') }}">+ New User</a></div><div class="card"><div class="card-body table-responsive"><table class="table"><thead><tr><th>Username</th><th>Name</th><th>Role</th><th>Focus</th><th>Active</th><th></th></tr></thead><tbody>{% for u in users %}<tr><td>{{u.username}}</td><td>{{u.full_name}}</td><td><span class="badge bg-dark">{{u.role}}</span></td><td>{{u.focus}}</td><td>{{'Yes' if u.is_active else 'No'}}</td><td><a class="btn btn-sm btn-outline-primary" href="{{ url_for('user_form', id=u.id) }}">Edit</a> {% if u.id != current_user.id %}<form class="d-inline" method="post" action="{{ url_for('user_delete', id=u.id) }}" onsubmit="return confirm('Delete user?')"><button class="btn btn-sm btn-outline-danger">Delete</button></form>{% endif %}</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
