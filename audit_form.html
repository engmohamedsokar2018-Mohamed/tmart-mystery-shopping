{% extends 'base.html' %}{% block title %}Submit Audit{% endblock %}{% block content %}<form class="card" method="post"><h3>Audit Details</h3><div class="body"><div class="form-grid">{% if session.role=='admin' %}<div class="field"><label>Auditor</label><select name="auditor_id">{% for u in users %}<option value="{{u.id}}">{{u.name}}</option>{% endfor %}</select></div>{% endif %}<div class="field"><label>Store</label><select name="store_code" required>{% for s in stores %}<option value="{{s.code}}">{{s.code}} - {{s.name}}</option>{% endfor %}</select></div><div class="field"><label>Category</label><select name="category" required>{% for c in categories %}<option>{{c}}</option>{% endfor %}</select></div><div class="field"><label>Item Type</label><select name="item_type">{% for t in item_types %}<option>{{t}}</option>{% endfor %}</select></div><div class="field"><label>Date</label><input type="date" name="audit_date" value="{{today}}"></div><div class="field"><label>Time</label><input type="time" name="audit_time" value="{{now}}"></div><div class="field"><label>Product Name</label><input name="product_name" required></div><div class="field"><label>Brand</label><input name="brand"></div><div class="field"><label>Supplier</label><input name="supplier"></div></div></div><h3>Quality Criteria</h3><div class="body criteria">{% for cid,name,weight in criteria %}<div class="crit"><div><b>{{name}}</b><br><small>{{weight}} pts</small></div><select name="{{cid}}"><option value="pass">Pass</option><option value="fail">Fail</option><option value="na">N/A</option></select></div>{% endfor %}</div><h3>Availability</h3><div class="body"><div class="form-grid"><div class="field"><label>Availability %</label><input name="availability_pct" type="number" min="0" max="100" value="100"></div><div class="field"><label>Stock Status</label><select name="stock_status"><option value="in-stock">In Stock</option><option value="partial">Partial</option><option value="out-of-stock">Out of Stock</option></select></div><div class="field"><label>Critical Items Available?</label><select name="critical_available"><option value="yes">Yes</option><option value="no">No</option></select></div><div class="field"><label>Availability Notes</label><input name="availability_notes"></div></div><div class="field" style="margin-top:14px"><label>General Notes</label><textarea name="notes"></textarea></div><button class="btn btn-orange" style="margin-top:14px">Submit Audit</button></div></form>{% endblock %}
